    max_build_duration: 60
    integrations:
      app_store_connect: zerog-signing

    environment:
      groups:
        - signing_v3
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 20
      xcode: latest

