workflows:
  ios-development:
    name: ZeroG iOS — Ad Hoc
    max_build_duration: 60

    integrations:
      app_store_connect: zerog-signing   # Connected in Team Settings → Developer Portal

    environment:
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.zerog.companion
      node: 20
      xcode: 16

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Copy web assets into iOS project
        script: |
          rm -rf ios/App/App/public
          cp -r dist/ ios/App/App/public

      - name: Install CocoaPods
        script: echo "Capacitor 8 uses Swift Package Manager — no pod install needed"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          # Register bundle ID (idempotent)
          app-store-connect create-bundle-id \
            --identifier "$BUNDLE_ID" \
            --name "ZeroG" \
            --platform IOS 2>/dev/null || true
          # Fetch Ad Hoc profile + certificate (GUI-managed cert — no --certificate-key needed)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set Xcode signing settings
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          mkdir -p /tmp/xcodebuild_logs
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            2>&1 | tee /tmp/xcodebuild_logs/build-ipa.log; exitCode=${PIPESTATUS[0]}
          if [ $exitCode -ne 0 ]; then
            echo "=== BUILD FAILED — last 100 lines ==="
            tail -100 /tmp/xcodebuild_logs/build-ipa.log
            exit $exitCode
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - akiva613@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: ZeroG iOS — TestFlight
    max_build_duration: 60

    integrations:
      app_store_connect: zerog-signing

    environment:
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.zerog.companion
      node: 20
      xcode: 16

    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Copy web assets into iOS project
        script: |
          rm -rf ios/App/App/public
          cp -r dist/ ios/App/App/public

      - name: Install CocoaPods
        script: echo "Capacitor 8 uses Swift Package Manager — no pod install needed"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files for App Store
        script: |
          app-store-connect create-bundle-id \
            --identifier "$BUNDLE_ID" \
            --name "ZeroG" \
            --platform IOS 2>/dev/null || true
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set Xcode signing settings
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - akiva613@gmail.com
        notify:
          success: true
          failure: true
