workflows:
  ios-development:
    name: ZeroG iOS — Ad Hoc
    max_build_duration: 60

    environment:
      groups:
        - signing_v3   # CERT_PRIVATE_KEY, APP_STORE_CONNECT_*, BUNDLE_ID — all fresh, no corruption
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 20
      xcode: latest

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Copy web assets + generate iOS config files
        script: |
          rm -rf ios/App/App/public
          cp -r dist/ ios/App/App/public
          # capacitor.config.json and config.xml are gitignored but required by xcodebuild
          cp capacitor.config.json ios/App/App/capacitor.config.json
          printf "<?xml version='1.0' encoding='utf-8'?>\n<widget version=\"1.0.0\" xmlns=\"http://www.w3.org/ns/widgets\" xmlns:cdv=\"http://cordova.apache.org/ns/1.0\">\n  <access origin=\"*\" />\n</widget>\n" > ios/App/App/config.xml

      - name: Install CocoaPods
        script: echo "Capacitor 8 uses Swift Package Manager — no pod install needed"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          # Register bundle ID (idempotent)
          app-store-connect create-bundle-id \
            --identifier "$BUNDLE_ID" \
            --name "ZeroG" \
            --platform IOS 2>/dev/null || true
          # Fetch Ad Hoc distribution cert + provisioning profile
          # CERT_PRIVATE_KEY is PKCS#8 format — accepted by app-store-connect CLI
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --certificate-key @env:CERT_PRIVATE_KEY \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates
          # Unlock keychain and grant codesign access (prevents errSecInternalComponent in headless CI)
          KEYCHAIN=$(security list-keychains | tr -d '" ' | grep cm-signing | head -1)
          echo "Keychain: $KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$CM_KEYCHAIN_PASSWORD" "$KEYCHAIN" 2>/dev/null || true
          echo "=== Valid signing identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN" || true

      - name: Set build number
        script: |
          agvtool new-version -all $BUILD_NUMBER || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist

      - name: Set Xcode signing settings
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          mkdir -p /tmp/xcodebuild_logs build/ios/ipa
          KEYCHAIN=$(security list-keychains | tr -d '" ' | grep cm-signing | head -1)
          security unlock-keychain -p "$CM_KEYCHAIN_PASSWORD" "$KEYCHAIN" 2>/dev/null || true
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=V9K7MGMA4F \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log; archiveExit=${PIPESTATUS[0]}
          if [ $archiveExit -ne 0 ]; then
            echo "=== ARCHIVE FAILED (last 100 lines) ==="
            tail -100 /tmp/xcodebuild_logs/archive.log
            exit $archiveExit
          fi
          PROFILE_PATH=$(find /tmp/App.xcarchive -name "embedded.mobileprovision" | head -1)
          [ -z "$PROFILE_PATH" ] && { echo "ERROR: No embedded.mobileprovision in xcarchive"; exit 1; }
          PROFILE_NAME=$(python3 -c "import subprocess,plistlib; xml=subprocess.check_output(['security','cms','-D','-i','$PROFILE_PATH']); print(plistlib.loads(xml)['Name'])")
          echo "Using profile from archive: [$PROFILE_NAME]"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0"><dict>'
            echo '<key>method</key><string>app-store-connect</string>'
            echo '<key>teamID</key><string>V9K7MGMA4F</string>'
            echo '<key>compileBitcode</key><false/>'
            echo '<key>signingStyle</key><string>manual</string>'
            echo '<key>signingCertificate</key><string>Apple Distribution</string>'
            echo '<key>provisioningProfiles</key><dict>'
            echo "<key>com.zerog.companion</key><string>$PROFILE_NAME</string>"
            echo '</dict>'
            echo '</dict></plist>'
          } > /tmp/ExportOptions.plist
          cat /tmp/ExportOptions.plist
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            2>&1 | tee /tmp/xcodebuild_logs/export.log

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - akiva613@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
