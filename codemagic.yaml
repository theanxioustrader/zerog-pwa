workflows:
  ios-development:
    name: ZeroG iOS — Ad Hoc
    max_build_duration: 60
    
    environment:
      groups:
        - ios_signing   # APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_PRIVATE_KEY, BUNDLE_ID
        - cert_keys     # DIST_CERT_KEY — RSA PKCS#1 private key for distribution cert
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 20
      xcode: 16

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Copy web assets into iOS project
        script: |
          rm -rf ios/App/App/public
          cp -r dist/ ios/App/App/public

      - name: Install CocoaPods
        script: echo "Capacitor 8 uses Swift Package Manager — no pod install needed"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files via App Store Connect API
        script: |
          # Register bundle ID (idempotent)
          app-store-connect create-bundle-id \
            --identifier "$BUNDLE_ID" \
            --name "ZeroG" \
            --platform IOS 2>/dev/null || true
          # Write cert key to temp file (prevents newline encoding issues)
          printf '%s' "$DIST_CERT_KEY" > /tmp/cert_key.pem
          echo "" >> /tmp/cert_key.pem
          echo "--- cert key first line: $(head -1 /tmp/cert_key.pem)"  # debug
          # Fetch or create Ad Hoc distribution certificate + provisioning profile
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --certificate-key @file:/tmp/cert_key.pem \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set Xcode signing settings
        script: xcode-project use-profiles

      - name: Verify keychain + import private key
        script: |
          KEYCHAIN=~/Library/Keychains/cm-signing.keychain
          echo "=== Signing identities in keychain BEFORE key import ==="
          security find-identity -v -p codesigning "$KEYCHAIN" || true
          echo "=== Explicitly importing RSA private key into signing keychain ==="
          printf '%s' "$DIST_CERT_KEY" > /tmp/cert_key.pem
          echo "" >> /tmp/cert_key.pem
          security import /tmp/cert_key.pem \
            -k "$KEYCHAIN" \
            -T /usr/bin/codesign \
            -T /usr/bin/security || echo "Key import note: already exists or format issue"
          echo "=== Signing identities AFTER key import ==="
          security find-identity -v -p codesigning "$KEYCHAIN" || true

      - name: Build IPA
        script: |
          mkdir -p /tmp/xcodebuild_logs
          # Build IPA using Codemagic helper (handles signing automatically)
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            2>&1 | tee /tmp/xcodebuild_logs/build-ipa.log; exitCode=${PIPESTATUS[0]}
          # Print last 80 lines of log on failure so error is visible in Codemagic UI
          if [ $exitCode -ne 0 ]; then
            echo "=== BUILD FAILED — last 80 lines ==="
            tail -80 /tmp/xcodebuild_logs/build-ipa.log
            exit $exitCode
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - akiva613@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: ZeroG iOS — TestFlight
    max_build_duration: 60

    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 20
      xcode: 16

    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Copy web assets into iOS project
        script: |
          rm -rf ios/App/App/public
          cp -r dist/ ios/App/App/public

      - name: Install CocoaPods
        script: |
          echo "Capacitor 8 uses Swift Package Manager — no pod install needed"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files for App Store
        script: |
          app-store-connect create-bundle-id \
            --identifier "$BUNDLE_ID" \
            --name "ZeroG" \
            --platform IOS 2>/dev/null || true
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set Xcode signing settings
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: environment_variables
        submit_to_testflight: true
      email:
        recipients:
          - akiva613@gmail.com
        notify:
          success: true
          failure: true
