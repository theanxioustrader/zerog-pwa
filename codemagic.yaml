          PROFILE_NAME=$(python3 -c "import subprocess,plistlib; xml=subprocess.check_output(['security','cms','-D','-i','$PROFILE_PATH']); print(plistlib.loads(xml)['Name'])")
          echo "Using profile from archive: [$PROFILE_NAME]"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0"><dict>'
            echo '<key>method</key><string>app-store-connect</string>'
            echo '<key>teamID</key><string>V9K7MGMA4F</string>'
            echo '<key>compileBitcode</key><false/>'
            echo '<key>signingStyle</key><string>manual</string>'
            echo '<key>signingCertificate</key><string>Apple Distribution</string>'
            echo '<key>provisioningProfiles</key><dict>'
            echo "<key>com.zerog.companion</key><string>$PROFILE_NAME</string>"
            echo '</dict>'
            echo '</dict></plist>'
          } > /tmp/ExportOptions.plist
          cat /tmp/ExportOptions.plist
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
