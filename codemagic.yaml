workflows:
  ios-development:
    name: ZeroG iOS — Ad Hoc
    max_build_duration: 60
    
    environment:
      groups:
        - ios_signing   # APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_PRIVATE_KEY, BUNDLE_ID
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 20
      xcode: 16

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Copy web assets into iOS project
        script: |
          rm -rf ios/App/App/public
          cp -r dist/ ios/App/App/public

      - name: Install CocoaPods
        script: echo "Capacitor 8 uses Swift Package Manager — no pod install needed"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files via App Store Connect API
        script: |
          # Register bundle ID (idempotent)
          app-store-connect create-bundle-id \
            --identifier "$BUNDLE_ID" \
            --name "ZeroG" \
            --platform IOS 2>/dev/null || true
          # Generate a fresh RSA key for the distribution certificate
          openssl genrsa -out /tmp/dist_cert_key.pem 2048
          # Fetch or create Ad Hoc distribution certificate + provisioning profile
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --certificate-key @file:/tmp/dist_cert_key.pem \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set Xcode signing settings
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - akiva613@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: ZeroG iOS — TestFlight
    max_build_duration: 60

    environment:
      groups:
        - ios_signing
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 20
      xcode: 16

    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Copy web assets into iOS project
        script: |
          rm -rf ios/App/App/public
          cp -r dist/ ios/App/App/public

      - name: Install CocoaPods
        script: |
          echo "Capacitor 8 uses Swift Package Manager — no pod install needed"

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files for App Store
        script: |
          app-store-connect create-bundle-id \
            --identifier "$BUNDLE_ID" \
            --name "ZeroG" \
            --platform IOS 2>/dev/null || true
          openssl genrsa -out /tmp/dist_cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/dist_cert_key.pem \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set Xcode signing settings
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: environment_variables
        submit_to_testflight: true
      email:
        recipients:
          - akiva613@gmail.com
        notify:
          success: true
          failure: true
